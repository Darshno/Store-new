<!doctype html>
<html>
  <head>
    <title>Products</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }
      .header {
        padding: 20px;
        background: #f5f5f5;
        border-bottom: 1px solid #ddd;
      }
      .container {
        display: flex;
      }
      .sidebar {
        width: 200px;
        background: #f9f9f9;
        padding: 20px;
        border-right: 1px solid #ddd;
        min-height: calc(100vh - 150px);
      }
      .sidebar h3 {
        margin-top: 0;
      }
      .sidebar ul {
        list-style: none;
        padding: 0;
      }
      .sidebar li {
        padding: 10px;
        margin: 5px 0;
        cursor: pointer;
        border-radius: 4px;
        transition: background 0.2s;
      }
      .sidebar li:hover {
        background: #e0e0e0;
      }
      .sidebar li.active {
        background: #007bff;
        color: white;
      }
      .main-content {
        flex: 1;
        padding: 20px;
      }
      .products {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }
      .card {
        border: 3px solid #ddd;
        padding: 10px;
      }
      img {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>Products</h1>
      <a href="client.html"> login </a>
      <a href="signup.html"> Sign in </a>
      <a href="cart.html"> Cart </a>
      <a href="wishlist.html"> Wishlist </a>
      <a href="orders.html"> Orders </a>
      <a href="seller-login.html"> COMPANY</a>
      <h2 id="welcome"></h2>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="container">
      <div class="sidebar">
        <h3>Categories</h3>
        <ul id="categories">
          <li class="active" onclick="filterByCategory('all')">All Products</li>
        </ul>
      </div>

      <div class="main-content">
        <div class="products" id="products"></div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
