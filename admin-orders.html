<!doctype html>
<html>
  <head>
    <title>All Orders - Admin</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background: #f5f5f5;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .order-card {
        border: 1px solid #ddd;
        padding: 20px;
        margin: 15px 0;
        border-radius: 8px;
        background: #fafafa;
      }
      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #ddd;
        padding-bottom: 10px;
        margin-bottom: 15px;
      }
      .order-id {
        font-weight: bold;
        color: #007bff;
      }
      .order-status {
        padding: 5px 15px;
        border-radius: 20px;
        background: #28a745;
        color: white;
        font-size: 14px;
      }
      .order-items {
        margin: 15px 0;
      }
      .order-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
      }
      .customer-details {
        background: #f0f0f0;
        padding: 10px;
        border-radius: 4px;
        margin: 10px 0;
      }
      .order-total {
        font-size: 20px;
        font-weight: bold;
        text-align: right;
        margin-top: 10px;
        color: #28a745;
      }
      .empty-message {
        text-align: center;
        padding: 60px 20px;
        color: #666;
      }
      .filter-section {
        margin-bottom: 20px;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 4px;
      }
      .filter-section input {
        padding: 8px;
        margin-right: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }
      .stat-card {
        flex: 1;
        padding: 15px;
        background: #007bff;
        color: white;
        border-radius: 8px;
        text-align: center;
      }
      .stat-card h3 {
        margin: 0;
        font-size: 32px;
      }
      .stat-card p {
        margin: 5px 0 0 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>All Customer Orders</h2>
        <div>
          <a href="seller.html">Back to Dashboard</a>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <h3 id="totalOrders">0</h3>
          <p>Total Orders</p>
        </div>
        <div class="stat-card" style="background: #28a745;">
          <h3 id="totalRevenue">₹0</h3>
          <p>Total Revenue</p>
        </div>
      </div>

      <div class="filter-section">
        <input type="text" id="searchInput" placeholder="Search by customer name, phone, or order ID" style="width: 400px;">
        <button onclick="filterOrders()">Search</button>
        <button onclick="clearFilter()">Clear</button>
      </div>

      <div id="orders"></div>
    </div>

    <script src="config.js"></script>
    <script src="admin-orders.js"></script>
  </body>
</html>
